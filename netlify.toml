[build]
  publish = "out"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy - allows current external resources
    Content-Security-Policy = "default-src 'self'; script-src 'self' code.jquery.com maxcdn.bootstrapcdn.com use.fontawesome.com; style-src 'self' 'unsafe-inline' maxcdn.bootstrapcdn.com use.fontawesome.com; img-src 'self' data: https:; frame-src vimeo.com; font-src 'self' data: maxcdn.bootstrapcdn.com use.fontawesome.com; connect-src 'self'; form-action 'self'"

    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # XSS Protection (legacy, but good fallback)
    X-XSS-Protection = "1; mode=block"

    # Referrer Policy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Feature Policy / Permissions Policy
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

    # HSTS (HTTP Strict Transport Security)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache control for JavaScript
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for CSS
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
